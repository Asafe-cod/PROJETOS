<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci</title>
</head>
<body>
   <h1>Série de Fibonacci</h1> 
   <form onsubmit="executar(); return false;"> 
    <label>Valor de x</label> 
    <input type="number" id="v1"/> 
    <button type="submit">Executar</button> 
    </form> 
    <div id="resp">O resultado aparece aqui</div>
     <script> function fibonacci(n){ if(n <= 1) return n; 
     let a = 0, b = 1, temp; 
     for(let i = 2; i <= n; i++){ temp = a + b; a = b; b = temp; } 
     return b; } 
     const executar = () => { const x = Number(document.getElementById("v1").value); 
     let serie = "", i = 0; while(i <= x){ serie += fibonacci(i) + " "; i++; } 
     document.getElementById("resp").innerHTML = `Resultado: ${serie}`; } </script>
</body>
</html>
